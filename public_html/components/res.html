<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Card HTML</title>
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Sistema de Variables - Aquí está tu "magia" ahora */
        :root {
            --bg-main: #121217;
            --text-main: #ffffff;
            --toggle-bg: #1f1f23;
            --toggle-hover: #2d2d33;

            --card-bg: #ececec;
            --card-text: #111827;
            --card-text-muted: #6b7280;
            --card-border: #ffffff;
            --card-shadow: inset 0 1px 2px #cfcfcf, 0 10px 30px rgba(0, 0, 0, 0.2);

            --icon-color: #db2777;
            --text-muted: #9ca3af;

            --avatar-bg: #f3f4f6;
            --avatar-border: #e5e7eb;
            --avatar-shadow: inset 0 1px 0px rgba(255, 255, 255, 0.8);
            --avatar-text-hover: #db2777;

            --btn-bg: #db2777;
            --btn-hover: #be185d;
            --btn-text: #ffffff;
            --btn-shadow: inset 0 1px 0px rgba(255, 255, 255, 0.3), 0 4px 10px rgba(219, 39, 119, 0.2);
            --btn-border: #be185d;
        }

        /* Sobreescritura para Modo Oscuro */
        .dark {
            --bg-main: #0a0a0c;
            --text-main: #f9fafb;
            --toggle-bg: #1f1f23;
            --toggle-hover: #2d2d33;

            --card-bg: #121217;
            --card-text: #ffffff;
            --card-text-muted: #9ca3af;
            --card-border: #1f1f27;
            --card-shadow: inset 0 1.5px 0.5px rgba(255, 255, 255, 0.15), 0 20px 40px rgba(0, 0, 0, 0.4);

            --icon-color: #f472b6;
            --text-muted: #9ca3af;

            --avatar-bg: #1c1c21;
            --avatar-border: rgba(255, 255, 255, 0.08);
            --avatar-shadow: inset 0 1px 0px rgba(255, 255, 255, 0.03);
            --avatar-text-hover: #f472b6;


            --btn-hover: #db2777;
            --btn-text: #ffffff;
            --btn-shadow: inset 0 1px 0px rgba(255, 255, 255, 0.3), 0 8px 16px rgba(244, 114, 182, 0.2);
            --btn-border: transparent;
        }

        /* Clases Estructurales */
        .app-container {
            min-height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-toggle-btn {
            margin-bottom: 2rem;
            padding: 0.5rem 1rem;
            background-color: var(--toggle-bg);
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: inherit;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .theme-toggle-btn:hover {
            background-color: var(--toggle-hover);
        }

        .invite-card {
            background-color: var(--card-bg);
            border: 3px solid var(--card-border);
            color: var(--card-text);
            border-radius: 28px;
            padding: 1.25rem;
            width: 100%;
            max-width: 340px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s;
        }

        .card-icon {
            color: var(--icon-color);
            transition: color 0.3s;
        }

        .card-title {
            color: var(--card-text);
            font-size: 17px;
            font-weight: 600;
            margin-top: 1rem;
            letter-spacing: -0.025em;
        }

        .card-subtitle {
            color: var(--card-text-muted);
            font-size: 14px;
            margin-top: 0.25rem;
            line-height: 1.375;
        }

        .avatar-list {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding: 0 0.25rem;
        }

        .avatar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }

        .avatar-circle {
            width: 3rem;
            height: 3rem;
            border-radius: 9999px;
            background-color: var(--avatar-bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--avatar-border);
            box-shadow: var(--avatar-shadow);
            transition: transform 0.2s;
        }

        .avatar-item:hover .avatar-circle {
            transform: scale(1.05);
        }

        .avatar-circle img {
            width: 2.5rem;
            height: 2.5rem;
            transform: translateY(4px);
        }

        .avatar-name {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .avatar-item:hover .avatar-name {
            color: var(--avatar-text-hover);
        }

        .action-btn {
            width: 100%;
            margin-top: 1.5rem;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-size: 15px;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 16px;
            border: 1px solid var(--btn-border);
            box-shadow: var(--btn-shadow);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background-color: var(--btn-hover);
        }

        .action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<!-- El body actúa como la raíz de nuestro tema -->

<body class="dark" id="theme-root">

    <div class="app-container">

        <!-- Toggle Button -->
        <button id="theme-toggle" class="theme-toggle-btn">
            Toggle Mode
        </button>

        <!-- Tarjeta principal -->
        <div class="invite-card">

            <!-- Icono -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" class="card-icon" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg>

            <h2 class="card-title">
                Invite family, friends, anyone
            </h2>
            <p class="card-subtitle">
                See what your team spends the most on
            </p>

            <!-- Lista de Avatares -->
            <div class="avatar-list">

                <!-- Avatar 1 -->
                <div class="avatar-item">
                    <div class="avatar-circle">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Felix&backgroundColor=transparent"
                            alt="Dad" />
                    </div>
                    <span class="avatar-name">Dad</span>
                </div>

                <!-- Avatar 2 -->
                <div class="avatar-item">
                    <div class="avatar-circle">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Aneka&backgroundColor=transparent"
                            alt="Mum" />
                    </div>
                    <span class="avatar-name">Mum</span>
                </div>

                <!-- Avatar 3 -->
                <div class="avatar-item">
                    <div class="avatar-circle">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Maikol&backgroundColor=transparent"
                            alt="Me" />
                    </div>
                    <span class="avatar-name">Me</span>
                </div>

                <!-- Avatar 4 -->
                <div class="avatar-item">
                    <div class="avatar-circle">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Buster&backgroundColor=transparent"
                            alt="Lil Sis" />
                    </div>
                    <span class="avatar-name">Lil Sis</span>
                </div>

            </div>

            <!-- Botón -->
            <button class="action-btn">
                Invite
            </button>

        </div>
    </div>

    <script>
        const themeRoot = document.getElementById('theme-root');
        const toggleBtn = document.getElementById('theme-toggle');

        toggleBtn.addEventListener('click', () => {
            themeRoot.classList.toggle('dark');
        });
    </script>
</body>

</html>
