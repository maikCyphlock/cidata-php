<style>
    .input-wrapper {
        flex: 1;
        min-width: 200px;
        padding: 1px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.02) 60%, transparent 100%);

        transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    .input-wrapper:focus-within {
        background: linear-gradient(180deg, rgba(var(--accent-rgb), 0.55) 0%, rgba(var(--accent-rgb), 0.08) 60%, transparent 100%);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 0 18px rgba(var(--accent-rgb), 0.25), 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .input-field {
        background: linear-gradient(180deg, #1a1a26 0%, #121220 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;

        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -1px 0 rgba(0, 0, 0, 0.25), inset 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .input-icon {
        flex-shrink: 0;
        color: #50506a;
        transition: color 0.2s ease;
        display: flex;
        align-items: center;
    }

    .input-wrapper:focus-within .input-icon {
        color: rgba(var(--accent-rgb), 1);
    }

    .input-field input[type="text"] {
        background: none;
        border: none;
        outline: none;
        box-shadow: none !important;
        -webkit-appearance: none;
        appearance: none;
        color: #d0d0e0;
        font-family: inherit;
        font-size: 13px;
        font-weight: 400;
        width: 100%;
        min-width: 0;
        caret-color: var(--accent);
    }

    .input-field input[type="text"]::placeholder {
        color: #44445a;
    }

    .input-kbd {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 3px;
        opacity: 0.4;
        transition: opacity 0.2s;
    }

    .input-wrapper:focus-within .input-kbd {
        opacity: 0;
    }

    .kbd {
        font-size: 10px;
        font-family: inherit;
        color: #808090;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        padding: 1px 5px;
        line-height: 16px;
        box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.3);
    }
</style>

<div class="input-wrapper">
    <div class="input-field">
        <span class="input-icon">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6" />
                <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
        </span>
        <input type="text" placeholder="Introducir dirección..." />
        <span class="input-kbd">
            <span class="kbd">⌘</span>
            <span class="kbd">K</span>
        </span>
    </div>
</div>
