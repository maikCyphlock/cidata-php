version: '3.8'

services:
  web:
    build: .
    container_name: cidata-web2
    ports:
      - "8888:80"
    volumes:
      # Monta todo el proyecto como /home/cidata/ (simulando cPanel)
      # public_html/ es la raíz web; db.php, .env, etc. quedan fuera
      - .:/home/cidata
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cidata-net

  db:
    image: mariadb:11
    container_name: cidata-db2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cidata-net

  adminer:
    image: adminer:latest
    container_name: cidata-adminer2
    restart: unless-stopped
    ports:
      - "8087:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - db
    networks:
      - cidata-net

  mailpit:
    image: axllent/mailpit
    container_name: cidata-mailpit2
    ports:
      - "8026:8025"
    networks:
      - cidata-net

networks:
  cidata-net:
    driver: bridge

volumes:
  db_data:
