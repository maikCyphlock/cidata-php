version: '3.8'

services:
  web:
    build: .
    container_name: cidata-web
    ports:
      - "8888:80"
    volumes:
      - ./web:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    networks:
      - cidata-net

  mailpit:
    image: axllent/mailpit
    container_name: cidata-mailpit
    ports:
      - "8026:8025"
    networks:
      - cidata-net

networks:
  cidata-net:
    driver: bridge
